<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neues Buch hinzufügen</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            border-radius: 22px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            transition: 0.35s;
        }

        .glass-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.14);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.20);
            border: none;
            color: #fff;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.28);
            box-shadow: none;
            color: #fff;
        }

        .form-label {
            margin-top: 12px;
            font-weight: 500;
        }

        .btn-apple {
            background: linear-gradient(135deg, #007aff, #0a84ff);
            border: none;
            padding: 12px;
            border-radius: 14px;
            width: 100%;
            font-size: 17px;
            transition: 0.3s;
        }

        .btn-apple:hover {
            background: linear-gradient(135deg, #0a84ff, #409cff);
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 15px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="glass-card col-md-6">

            <div class="title">📘 Neues Buch hinzufügen</div>

            <form action="/addNewBookBB" method="post" enctype="multipart/form-data">

                <label class="form-label">Buchtitel</label>
                <input type="text" name="BookName" class="form-control"/>

                <label class="form-label">Autor</label>
                <input type="text" name="BookAuthor" class="form-control"/>

                <label class="form-label">Datum</label>
                <input type="date" name="BookDate" class="form-control"/>

                <label class="form-label">Datei (PDF, DOCX, usw.)</label>
                <div class="upload-box">
                    <input type="file" name="BookFile" class="form-control"/>
                </div>

                <label class="form-label">Bild</label>
                <div class="upload-box">
                    <input type="file" name="BookImage" class="form-control"/>
                </div>

                <button type="submit" class="btn-apple mt-4">Buch speichern</button>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
