<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Bücher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .glass-nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 80px;
        }

        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: #fff;
            text-decoration: none;
            font-size: 17px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        /* MAIN CONTENT */
        .content {
            margin-left: 260px;
            padding: 40px;
        }

        /* TABLE */
        table {
            border-radius: 12px;
            overflow: hidden;
        }

        thead {
            background: rgba(255, 255, 255, 0.15);
        }

        tbody tr {
            transition: 0.3s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.01);
        }

        .image-circle {
            border-radius: 50%;
            object-fit: cover;
        }

        .btn-custom {
            background: #0d6efd;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #0b5ed7;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar glass-nav navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="/">BookManager</a>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item"><a class="nav-link text-white" href="#">Item 1</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Item 2</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Item 3</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Item 4</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Item 5</a></li>

                </ul>

                <div class="d-flex gap-3">
                    <a href="/getUserSignIn" class="btn btn-outline-light">Login</a>
                    <a href="/getCreateAccount" class="btn btn-primary">Registrieren</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/createNewBook">📘 Neues Buch hinzufügen</a>
        <a href="#">🎨 Erscheinungsbild 1</a>
        <a href="#">🎨 Erscheinungsbild 2</a>
        <a href="#">🎨 Erscheinungsbild 3</a>
        <a href="#">⚙️ Einstellungen</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <h2 class="mb-4">📚 Meine Bücher</h2>

        <table class="table table-dark table-hover table-striped align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Buchname</th>
                    <th>Autor</th>
                    <th>Datum</th>
                    <th>Datei</th>
                    <th>Bild</th>
                    <th>Aktionen</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="books: ${books}">
                    <td th:text="${books.BookId}"></td>
                    <td th:text="${books.BookName}"></td>
                    <td th:text="${books.BookAuthor}"></td>
                    <td th:text="${books.BookDate}"></td>

                    <td>
                        <a th:href="@{'/files/'+${books.BookFile}}" target="_blank" class="text-info">
                            Datei öffnen
                        </a>
                    </td>

                    <td>
                        <img th:src="@{'/images/'+${books.BookImage}}" class="image-circle" width="70" height="70">
                    </td>

                    <td>
                        <a th:href="@{/updateBook/{id}(id=${books.BookId})}" class="btn btn-warning btn-sm">Bearbeiten</a>
                        <a th:href="@{/deleteBook/{id}(id=${books.BookId})}" class="btn btn-danger btn-sm">Löschen</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
