<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 35px;
            transition: 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: none;
            color: #fff;
        }

        .btn-custom {
            background: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #0b5ed7;
        }

        .title {
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="glass-card col-md-5 shadow-lg">

            <div class="title text-center">Create New Account</div>

            <form action="/getCreateNewAccount" method="post">

                <label class="form-label mt-2">User Name</label>
                <input type="text" name="UserName" class="form-control" placeholder="Enter your username">

                <label class="form-label mt-3">Password</label>
                <input type="password" name="UserPass" class="form-control" placeholder="********">

                <label class="form-label mt-3">Confirm Password</label>
                <input type="password" name="UserConfirmPass" class="form-control" placeholder="********">

                <button type="submit" class="btn-custom mt-4">Create Account</button>

            </form>

            <h4 class="text-center mt-4">
                <a th:if="${message}" th:text="${message}" class="text-warning"></a>
            </h4>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
