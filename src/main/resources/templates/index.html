<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 30px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        a.btn-custom {
            background: #0d6efd;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        a.btn-custom:hover {
            background: #0b5ed7;
            color: #fff;
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg glass-nav">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="/">MyApp</a>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <!-- 4 Items -->
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/dashboard">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="/services">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="/about">About Us</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="/contact">Contact</a>
                    </li>
                </ul>

                <!-- Sign In + Create Account -->
                <div class="d-flex gap-3">
                    <a href="/getUserSignIn" class="btn btn-outline-light">Sign In</a>
                    <a href="/getCreateAccount" class="btn btn-primary">Create Account</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container d-flex justify-content-center align-items-center" style="height: 90vh;">
        <div class="card text-center shadow-lg">
            <div class="title">Hallo bla bla 👋</div>

            <p class="mb-4">Welcome to our modern Spring Boot application</p>

            <div class="d-grid gap-3">
                <a href="/getUserSignIn" class="btn-custom">Sign In</a>
                <a href="/getCreateAccount" class="btn-custom">Create New Account</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
