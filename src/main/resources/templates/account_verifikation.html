<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 35px;
            transition: 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: none;
            color: #fff;
        }

        .btn-custom {
            background: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #0b5ed7;
        }

        .title {
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .success-box {
            background: rgba(0, 255, 0, 0.15);
            border: 1px solid rgba(0, 255, 0, 0.25);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="glass-card col-md-5 shadow-lg">

            <div class="title text-center">Email Verification</div>

            <p class="text-center mb-4">Please enter the PIN we sent to your email</p>

            <form action="/getVerifikationn/{id}" method="post">

                <label class="form-label mt-2">PIN Number</label>
                <input type="text" name="PinNumber" class="form-control" placeholder="Enter your PIN">

                <button type="submit" class="btn-custom mt-4">Verify</button>

            </form>

            <!-- Success Message -->
            <div th:if="${successmessage}" class="success-box">
                <p th:text="${successmessage}" class="text-success fw-bold"></p>
                <a th:href="@{/getUserSignIn}" class="btn btn-primary mt-3">Go to Login</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
